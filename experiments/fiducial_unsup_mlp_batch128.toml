[model]
arch = "mlp"        # "mlp" or "ds"
width = 256
depth = 3

[model.ds]          # extra params only used when arch = "ds"
phi_output_dim = 64

[training]
seed = 42
n_epochs = 40_000
batch_size = 128
lr = 1e-3
log_every = 200
loss = "fstar"
sampler = "uniform_log"

[domain]
log_rho_range = [0.0, 2.0]
log_p_range = [0.0, 2.0]
u_range = [-1.0, 1.0]
