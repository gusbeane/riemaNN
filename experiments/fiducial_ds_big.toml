[model]
arch = "ds"        # "mlp" or "ds"
width = 1024 
depth = 3

[model.ds]          # extra params only used when arch = "ds"
phi_output_dim = 32

[training]
seed = 42
n_epochs = 50_000
batch_size = 512
lr = 1e-3
log_every = 200

[domain]
log_rho_range = [-2.0, 1.0]
log_p_range = [-1.0, 2.0]
u_range = [-1.0, 1.0]
